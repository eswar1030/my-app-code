name: Build and Deploy via GitOps

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push Docker Image
        run: |
          IMAGE_TAG=${{ github.sha }}
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/my-app:${IMAGE_TAG} .
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/my-app:${IMAGE_TAG}

      - name: Checkout GitOps Repository
        uses: actions/checkout@v4
        with:
          repository: 'eswar1030/my-app-gitops'
          token: ${{ secrets.GITOPS_PAT }}
          path: 'gitops-repo'

      - name: Update Image Tag in GitOps Manifest
        run: |
          cd gitops-repo
          sed -i "s|image: .*|image: ${{ secrets.DOCKERHUB_USERNAME }}/my-app:${{ github.sha }}|g" deployment.yaml
          
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git commit -am "chore: update image tag to ${{ github.sha }}"
          git push origin main
